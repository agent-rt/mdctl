name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14    # arm64
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig version
        run: zig version
      - name: build
        run: zig build --summary all
      - name: test
        run: zig build test --summary all
